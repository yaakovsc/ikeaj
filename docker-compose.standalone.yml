# Standalone mode — used when there is NO existing nginx on the server.
# Includes nginx (SSL termination) and certbot (auto-renewal).
# Usage: docker compose -f docker-compose.standalone.yml up -d
#
# nginx-ikea-standalone.conf is generated by install.sh (contains your domain).
# Run install.sh before using this file.

services:

  # ── nginx — SSL termination + reverse proxy ────────────────────────────────
  nginx:
    container_name: ikea-nginx
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-ikea-standalone.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    depends_on:
      - frontend
      - jobs-server
      - adam-service
    restart: unless-stopped
    networks:
      - web

  # ── certbot — auto-renewal every 12 hours ─────────────────────────────────
  certbot:
    container_name: ikea-certbot
    image: certbot/certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM;
        while :; do
          certbot renew --webroot -w /var/www/certbot --quiet;
          sleep 12h & wait $${!};
        done"
    restart: unless-stopped

  # ── React frontend served by nginx ────────────────────────────────────────
  frontend:
    container_name: ikea-frontend
    build:
      context: ./ikea-jobs-page
      args:
        REACT_APP_JOBS_SERVER_URL: /ikea/api/apply
        REACT_APP_ADAM_SERVICE_URL: /ikea/api/jobs
        PUBLIC_URL: /ikea
    expose:
      - "80"
    restart: unless-stopped
    networks:
      - web

  # ── Application server (port 3001) ────────────────────────────────────────
  jobs-server:
    container_name: ikea-jobs-server
    build: ./ikea-jobs-server
    expose:
      - "3001"
    env_file:
      - ./.env
    environment:
      PORT: "3001"
    restart: unless-stopped
    networks:
      - web

  # ── ADAM cache + job-fetch service (port 3002) ────────────────────────────
  adam-service:
    container_name: ikea-adam-service
    build: ./ikea-adam-service
    expose:
      - "3002"
    env_file:
      - ./.env
    environment:
      PORT: "3002"
    volumes:
      - adam-data:/app/src/assets
      - ./ikea-adam-service/last_fetch.txt:/app/last_fetch.txt
      - ./ikea-adam-service/config.json:/app/config.json
    restart: unless-stopped
    networks:
      - web

volumes:
  adam-data:
  certbot-www:

networks:
  web:
    driver: bridge

services:

  # ── React frontend served by nginx ───────────────────────────────────────
  frontend:
    container_name: ikea-frontend
    build:
      context: ./ikea-jobs-page
      args:
        REACT_APP_JOBS_SERVER_URL: /ikea/api/apply
        REACT_APP_EMAIL_SERVICE_URL: /ikea/api/jobs
        PUBLIC_URL: /ikea
    expose:
      - "80"
    depends_on:
      - jobs-server
      - email-service
    networks:
      - web

  # ── Application / email server (port 3001) ───────────────────────────────
  jobs-server:
    container_name: ikea-jobs-server
    build: ./ikea-jobs-server
    expose:
      - "3001"
    env_file:
      - ./ikea-jobs-server/.env
    networks:
      - web

  # ── ADAM cache + job-fetch service (port 3002) ───────────────────────────
  email-service:
    container_name: ikea-email-service
    build: ./ikea-email-service
    expose:
      - "3002"
    env_file:
      - ./ikea-email-service/.env
    volumes:
      - adam-data:/app/src/assets
      - ./ikea-email-service/last_fetch.txt:/app/last_fetch.txt
      - ./ikea-email-service/config.json:/app/config.json
    networks:
      - web

volumes:
  adam-data:

networks:
  web:
    external: true   # shared with the existing nginx container

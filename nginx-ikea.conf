# ── Add these location blocks inside your existing server {} block ──────────
#
# Frontend (React SPA)
location /ikea/ {
    proxy_pass         http://frontend:80/;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
}

# Email / ADAM service — job listings
location /ikea/api/jobs/ {
    proxy_pass         http://email-service:3002/;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-Proto $scheme;
}

# Jobs server — application submission
location /ikea/api/apply/ {
    proxy_pass         http://jobs-server:3001/;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-Proto $scheme;
    client_max_body_size 6M;   # allow CV file uploads
}

# ═══════════════════════════════════════════════════════════════════
#  IKEA Jobs — nginx additions for /opt/giron-security/nginx/nginx.conf
#
#  STEP 1: Add these three upstream blocks inside the http {} block,
#          alongside the existing "upstream backend" and "upstream frontend".
#
#  STEP 2: Add the three location blocks inside the server {} block,
#          BEFORE the existing "location /" block.
# ═══════════════════════════════════════════════════════════════════


# ── Paste inside http { } ── after the existing upstream blocks ────

    upstream ikea-frontend {
        server ikea-frontend:80;
        keepalive 16;
    }

    upstream ikea-jobs-server {
        server ikea-jobs-server:3001;
        keepalive 16;
    }

    upstream ikea-email-service {
        server ikea-email-service:3002;
        keepalive 16;
    }


# ── Paste inside server { } ── BEFORE "location /" ────────────────

        # ─── IKEA Jobs app ───────────────────────────────────────
        location /ikea/ {
            proxy_pass         http://ikea-frontend/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # allow iframe embedding per IKEA spec
            add_header         X-Frame-Options   "SAMEORIGIN" always;
        }

        location /ikea/api/jobs/ {
            proxy_pass         http://ikea-email-service/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /ikea/api/apply/ {
            proxy_pass         http://ikea-jobs-server/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
            client_max_body_size 6M;
        }
